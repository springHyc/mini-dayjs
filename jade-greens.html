<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>翡翠色谱 · 绿蓝紫</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "PingFang SC", "Microsoft YaHei", "Heiti SC", sans-serif;
        background: linear-gradient(
          160deg,
          #0d1117 0%,
          #161b22 45%,
          #0d1117 100%
        );
        color: #e6edf3;
        line-height: 1.5;
        padding: 1rem 1rem 1.25rem;
      }
      h1 {
        text-align: center;
        font-weight: 600;
        font-size: clamp(1.15rem, 2.5vw, 1.5rem);
        letter-spacing: 0.06em;
        margin: 0 0 0.25rem;
        color: #f0f6fc;
      }
      .subtitle {
        text-align: center;
        font-size: 0.78rem;
        color: #8b949e;
        margin-bottom: 0.85rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.85rem;
        max-width: 900px;
        margin: 0 auto;
      }
      @media (max-width: 720px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
          max-width: 520px;
        }
      }
      @media (max-width: 400px) {
        .grid {
          grid-template-columns: 1fr;
          max-width: none;
        }
      }
      .card {
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 10px;
        overflow: hidden;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }
      .card:hover {
        border-color: #484f58;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      }
      .swatch {
        height: 96px;
        width: 100%;
        position: relative;
      }
      .swatch::after {
        content: "";
        position: absolute;
        inset: 0;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        pointer-events: none;
      }
      .body {
        padding: 0.65rem 0.7rem 0.75rem;
      }
      .name {
        font-size: 0.9rem;
        font-weight: 600;
        color: #f0f6fc;
        margin: 0 0 0.25rem;
        line-height: 1.25;
      }
      .rgba {
        font-family: ui-monospace, "SF Mono", "Cascadia Code", monospace;
        font-size: 0.65rem;
        color: #79c0ff;
        margin: 0 0 0.4rem;
        line-height: 1.35;
        word-break: break-all;
      }
      .desc {
        font-size: 0.78rem;
        color: #8b949e;
        margin: 0;
        line-height: 1.4;
      }
      .section {
        margin-top: 1.75rem;
      }
      .section:first-of-type {
        margin-top: 0;
      }
      .section-title {
        text-align: center;
        font-size: 0.95rem;
        font-weight: 600;
        color: #c9d1d9;
        margin: 0 0 0.65rem;
        letter-spacing: 0.06em;
      }
    </style>
  </head>
  <body>
    <h1>翡翠色谱</h1>
    <p class="subtitle">常见翡翠绿、蓝、紫色系 · RGBA 色块与特点</p>

    <section class="section">
      <h2 class="section-title">绿色系</h2>
      <div class="grid" id="greens"></div>
    </section>

    <section class="section">
      <h2 class="section-title">蓝色系</h2>
      <div class="grid" id="blues"></div>
    </section>

    <section class="section">
      <h2 class="section-title">紫色系</h2>
      <div class="grid" id="purples"></div>
    </section>

    <script>

          desc: "鲜艳明亮，偏黄调",

        {

          rgba: "rgba(75, 165, 80, 0.85)",

        },
        {

        },
        {
          name: "蓝水绿",

        },
        {
          name: "晴水绿",
          rgba: "rgba(100, 180, 170, 0.80)",
          desc: "淡雅清透，如雨后晴空",
        },
      ];

      const blueItems = [
        {
          name: "天空蓝",
          rgba: "rgba(135, 206, 235, 0.85)",
          desc: "明亮纯净，如晴朗天空",
        },
        {
          name: "蓝水翡翠",
          rgba: "rgba(100, 160, 180, 0.80)",
          desc: "蓝绿交融，通透水润",
        },
        {
          name: "湖水蓝",
          rgba: "rgba(70, 130, 150, 0.85)",
          desc: "深邃静谧，浓郁优雅",
        },
        {
          name: "晴水蓝",
          rgba: "rgba(120, 190, 200, 0.75)",
          desc: "淡雅清透，雨后晴空感",
        },
        {
          name: "油青蓝",
          rgba: "rgba(60, 90, 100, 0.90)",
          desc: "偏灰偏暗，油润沉稳",
        },
        {
          name: "墨翠蓝（透光）",
          rgba: "rgba(30, 60, 80, 0.95)",

        },
        {

      const purpleItems = [
        {
          name: "皇家紫",
          rgba: "rgba(120, 60, 140, 0.90)",
          desc: "浓郁纯正，高贵典雅，极品",
        },
        {
          name: "红紫",
          rgba: "rgba(160, 80, 120, 0.85)",

        },
        {
          name: "蓝紫",
          rgba: "rgba(100, 80, 160, 0.85)",

        },
        {

        },
        {
          name: "葡萄紫",
          rgba: "rgba(140, 90, 130, 0.85)",
          desc: "如成熟葡萄，饱满诱人",
        },
        {
          name: "灰紫",
          rgba: "rgba(130, 110, 130, 0.85)",
          desc: "带灰调，低调内敛",
        },
      ];

      function renderGrid(container, items) {
        items.forEach(({ name, rgba, desc }) => {
          const card = document.createElement("article");
          card.className = "card";
          card.innerHTML = `
        <div class="swatch" style="background:${rgba}"></div>
        <div class="body">
          <h2 class="name">${name}</h2>
          <p class="rgba">${rgba}</p>
          <p class="desc">${desc}</p>
        </div>
      `;
          container.appendChild(card);
        });
      }

      renderGrid(document.getElementById("greens"), greenItems);
      renderGrid(document.getElementById("blues"), blueItems);
      renderGrid(document.getElementById("purples"), purpleItems);
    </script>
  </body>
</html>
